---
- name: Create NiFi installation directory
  file:
    path: "{{ nifi_install_dir }}"
    state: directory
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"

- name: Download NiFi
  get_url:
    url: "https://archive.apache.org/dist/nifi/{{ nifi_version }}/nifi-{{ nifi_version }}-bin.tar.gz"
    dest: "/tmp/nifi-{{ nifi_version }}-bin.tar.gz"

- name: Extract NiFi
  unarchive:
    src: "/tmp/nifi-{{ nifi_version }}-bin.tar.gz"
    dest: "{{ nifi_install_dir }}"
    remote_src: yes
    creates: "{{ nifi_install_dir }}/nifi-{{ nifi_version }}"
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"

- name: Create symbolic link to the current version
  file:
    src: "{{ nifi_install_dir }}/nifi-{{ nifi_version }}"
    dest: "{{ nifi_install_dir }}/current"
    state: link
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"

- name: Configure nifi.properties
  template:
    src: nifi.properties.j2
    dest: "{{ nifi_install_dir }}/current/conf/nifi.properties"
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"
  notify: Restart NiFi

- name: Configure zookeeper.properties
  template:
    src: zookeeper.properties.j2
    dest: "{{ nifi_install_dir }}/current/conf/zookeeper.properties"
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"
  notify: Restart NiFi

- name: Configure state-management.xml
  template:
    src: state-management.xml.j2
    dest: "{{ nifi_install_dir }}/current/conf/state-management.xml"
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"
  notify: Restart NiFi

- name: Create myid file for embedded zookeeper
  template:
    src: myid.j2
    dest: "{{ nifi_install_dir }}/current/conf/zookeeper.myid"
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"
  when: nifi_state_management_embedded_zookeeper_start
  notify: Restart NiFi

- name: Ensure NiFi logs directory exists
  file:
    path: "{{ nifi_install_dir }}/current/logs"
    state: directory
    owner: "{{ nifi_user }}"
    group: "{{ nifi_group }}"

- name: Create NiFi systemd service
  template:
    src: nifi.service.j2
    dest: /etc/systemd/system/nifi.service
  notify: Reload systemd

- name: Ensure NiFi service is enabled
  systemd:
    name: nifi
    enabled: yes
    state: started
