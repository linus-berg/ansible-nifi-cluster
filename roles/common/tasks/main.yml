---
- name: Install dependencies (Debian/Ubuntu)
  apt:
    name:
      - openjdk-11-jdk
      - unzip
      - tar
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install dependencies (RedHat/CentOS)
  yum:
    name:
      - java-11-openjdk-devel
      - unzip
      - tar
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure nifi group exists
  group:
    name: "{{ nifi_group }}"
    state: present

- name: Ensure nifi user exists
  user:
    name: "{{ nifi_user }}"
    group: "{{ nifi_group }}"
    shell: /bin/false
    state: present
